<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manajemen Kegiatan Akhir Tahun Ajaran 2025/2026 - SDN Pejaten Timur 11</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    body {
      background-color: #f8f9fa; /* Warna latar abu-abu sangat muda yang minimalis */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .logo-sekolah {
      max-width: 90px; /* Ukuran logo tidak terlalu besar */
      height: auto;
      margin-bottom: 20px;
    }

    .header-title {
      color: #2c3e50;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .header-subtitle {
      color: #7f8c8d;
      font-weight: 500;
      margin-bottom: 40px;
    }

    /* Styling Kotak (Card) */
    .menu-card {
      background: #ffffff;
      border-radius: 12px;
      border: none;
      transition: all 0.3s ease;
      text-decoration: none !important;
      color: #333;
    }

    .menu-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }

    .menu-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    /* Warna Icon Spesifik */
    .icon-drive { color: #1a73e8; }
    .icon-ekskul { color: #e53935; }
    .icon-rapor { color: #4caf50; }
  </style>
</head>
<body>

  <div class="container py-5">
    
    <div class="row justify-content-center text-center">
      <div class="col-md-10">
        <img src="https://lh3.googleusercontent.com/d/1c8Aj59FsU76R5nx_sQm1g6lHYu9-HpsP" alt="Logo SDN Pejaten Timur 11" class="logo-sekolah shadow-sm rounded-circle">
        <h2 class="header-title">Sistem Manajemen Kegiatan Akhir Tahun</h2>
        <h4 class="header-subtitle">SDN Pejaten Timur 11</h4>
      </div>
    </div>

    <div class="row justify-content-center g-4 mt-2">
      
      <div class="col-md-4 col-sm-12">
        <a href="https://drive.google.com/drive/folders/1c1FDMdJAgpr8iNX96JzjOf3oENOGklMN?usp=sharing" target="_blank" class="card h-100 shadow-sm menu-card text-center p-4">
          <div class="card-body p-0">
            <i class="bi bi-cloud-arrow-up-fill menu-icon icon-drive"></i>
            <h5 class="card-title fw-bold mt-2">Unggah Kisi-kisi<br>dan Soal ASAS</h5>
            <p class="text-muted small mt-2 mb-0">Akses folder Google Drive</p>
          </div>
        </a>
      </div>

      <div class="col-md-4 col-sm-12">
        <a href="https://www.sdnpejatentimur11.site/inputekstrakurikuler" target="_blank" class="card h-100 shadow-sm menu-card text-center p-4">
          <div class="card-body p-0">
            <i class="bi bi-award-fill menu-icon icon-ekskul"></i>
            <h5 class="card-title fw-bold mt-2">Nilai<br>Ekstrakurikuler</h5>
            <p class="text-muted small mt-2 mb-0">Portal penilaian ekstrakurikuler</p>
          </div>
        </a>
      </div>

      <div class="col-md-4 col-sm-12">
        <a href="http://218.33.120.45:8535/" target="_blank" class="card h-100 shadow-sm menu-card text-center p-4">
          <div class="card-body p-0">
            <i class="bi bi-journal-check menu-icon icon-rapor"></i>
            <h5 class="card-title fw-bold mt-2">E-Rapor<br>Sekolah</h5>
            <p class="text-muted small mt-2 mb-0">Sistem E-Rapor</p>
          </div>
        </a>
      </div>

    </div>
    
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Hasil TKA - SDN Pejaten Timur 11</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1c8Aj59FsU76R5nx_sQm1g6lHYu9-HpsP">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            background-color: #343a40; 
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            transition: background-image 0.5s ease-in-out;
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-img {
            max-width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        .score-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 1.5rem 0.5rem; 
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .score-value {
            font-size: 2.5rem; 
            font-weight: 800;
            color: #0d6efd;
            line-height: 1;
            margin-top: 10px;
        }
        .score-label {
            font-size: 0.95rem; 
            font-weight: 600;
            color: #495057;
        }

        @media (min-width: 576px) {
            .score-value { font-size: 3.5rem; }
            .score-label { font-size: 1.1rem; }
            .logo-img { max-width: 90px; }
        }

        #result-section, #loading-section {
            display: none;
        }
        
        .input-group-text.eye-btn {
            cursor: pointer;
            background-color: #fff;
        }
        .input-group-text.eye-btn:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div id="bg-layer" class="bg-layer"></div>
<div class="overlay"></div>

<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div id="error-message" class="alert alert-danger d-none shadow-sm" role="alert"></div>

            <div id="loading-section" class="text-center my-5 glass-card p-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 mb-0 fw-semibold text-dark">Mengambil data dari server...</p>
            </div>

            <div id="login-section" class="card glass-card p-3 p-md-5 mb-4">
                <div class="text-center mb-4 mt-2">
                    <img src="https://lh3.googleusercontent.com/d/1c8Aj59FsU76R5nx_sQm1g6lHYu9-HpsP" alt="Logo Sekolah" class="logo-img">
                    <h4 class="fw-bold text-dark">Hasil TKA 2026</h4>
                    <h6 class="text-secondary">SDN Pejaten Timur 11</h6>
                </div>

                <div class="card-body p-0">
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="nisn" class="form-label fw-semibold text-dark">NISN</label>
                            <input type="number" class="form-control form-control-lg" id="nisn" placeholder="Masukkan NISN" required>
                        </div>
                        <div class="mb-4">
                            <label for="tgl-lahir" class="form-label fw-semibold text-dark">Tanggal Lahir (Password)</label>
                            <div class="input-group">
                                <input type="password" inputmode="numeric" class="form-control form-control-lg" id="tgl-lahir" placeholder="DDMMYYYY" required>
                                <span class="input-group-text eye-btn" id="togglePassword">
                                    <i class="bi bi-eye-slash" id="eyeIcon"></i>
                                </span>
                            </div>
                            <div class="form-text text-dark opacity-75">Contoh: 19052013 (8 digit angka).</div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Cari Hasil</button>
                    </form>
                </div>
            </div>

            <div id="result-section">
                <div class="text-center mb-4 text-white">
                    <img src="https://lh3.googleusercontent.com/d/1c8Aj59FsU76R5nx_sQm1g6lHYu9-HpsP" alt="Logo Sekolah" class="logo-img bg-white rounded-circle p-2 shadow">
                    <h4 class="fw-bold mt-2 text-shadow">Pengumuman Hasil TKA</h4>
                    <h6>SDN Pejaten Timur 11</h6>
                </div>

                <div class="card glass-card p-3 p-md-4 mb-4">
                    <div class="card-body p-0">
                        <h6 class="fw-bold border-bottom border-secondary-subtle pb-2 mb-3 text-primary">Data Peserta</h6>
                        <table class="table table-borderless table-sm mb-0">
                            <tbody>
                                <tr>
                                    <th style="width: 40%" class="text-secondary">Nomor Peserta</th>
                                    <td id="res-nopes" class="fw-bold text-dark"></td>
                                </tr>
                                <tr>
                                    <th class="text-secondary">NISN</th>
                                    <td id="res-nisn" class="fw-bold text-dark"></td>
                                </tr>
                                <tr>
                                    <th class="text-secondary">Nama Lengkap</th>
                                    <td id="res-nama" class="fw-bold text-dark"></td>
                                </tr>
                                <tr>
                                    <th class="text-secondary">Tanggal Lahir</th>
                                    <td id="res-tgl" class="fw-bold text-dark"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="row g-2 g-md-3">
                    <div class="col-6">
                        <div class="score-box shadow-sm">
                            <div class="score-label">Matematika</div>
                            <div class="score-value" id="res-mtk">0</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="score-box shadow-sm">
                            <div class="score-label">Bahasa Indonesia</div>
                            <div class="score-value" id="res-bind">0</div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4 mb-5">
                    <button class="btn btn-light btn-lg px-4 shadow-sm fw-semibold" onclick="resetForm()">
                        <i class="bi bi-box-arrow-left me-2"></i>Keluar & Kembali
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4-71QU5v2i6EOIWKIDMMYBqOJkU7HHXJeSi8HYvLp883FWfmk5n5gHzrZMcmQj9Y5_A/exec';

    const bgLoginUrl = 'https://lh3.googleusercontent.com/d/1rVGztFi_ZH9yQwTYDqGOYDXMCkN_fnAF';
    const bgResultUrl = 'https://lh3.googleusercontent.com/d/1nBjpEGXGBi4KNbK7aePl9a56zfYn3aQ4';

    function setBackground(type) {
        const bgLayer = document.getElementById('bg-layer');
        if (type === 'login') {
            bgLayer.style.backgroundImage = `url('${bgLoginUrl}')`;
        } else if (type === 'result') {
            bgLayer.style.backgroundImage = `url('${bgResultUrl}')`;
        }
    }

    function tampilkanHasil(data) {
        setBackground('result');

        document.getElementById('res-nopes').innerText = data.nomorPeserta;
        document.getElementById('res-nisn').innerText = data.nisn;
        document.getElementById('res-nama').innerText = data.namaPeserta;
        document.getElementById('res-tgl').innerText = formatTanggal(data.tanggalLahir);
        
        document.getElementById('res-mtk').innerText = data.matematika;
        document.getElementById('res-bind').innerText = data.bahasaIndonesia;

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
    }

    document.addEventListener("DOMContentLoaded", function() {
        const dataTersimpan = sessionStorage.getItem("dataTKA");
        if (dataTersimpan) {
            tampilkanHasil(JSON.parse(dataTersimpan));
        } else {
            setBackground('login');
            document.getElementById('login-section').style.display = 'block';
        }
    });

    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('tgl-lahir');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        }
    });

    function formatTanggal(tglStr) {
        if (!tglStr || String(tglStr).length !== 8) return tglStr;
        
        const hari = parseInt(tglStr.substring(0, 2), 10);
        const bulanIndex = parseInt(tglStr.substring(2, 4), 10) - 1;
        const tahun = tglStr.substring(4, 8);
        
        const namaBulan = [
            "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
            "Juli", "Agustus", "September", "Oktober", "November", "Desember"
        ];
        
        return `${hari} ${namaBulan[bulanIndex]} ${tahun}`;
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nisnInput = document.getElementById('nisn').value.trim();
        const tglInput = document.getElementById('tgl-lahir').value.trim();
        const errorMsg = document.getElementById('error-message');
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'block';
        errorMsg.classList.add('d-none');

        fetch(`${SCRIPT_URL}?nisn=${nisnInput}&tglLahir=${tglInput}`)
            .then(response => response.json())
            .then(res => {
                if (res.status === 'success') {
                    const data = res.data;
                    sessionStorage.setItem("dataTKA", JSON.stringify(data));
                    tampilkanHasil(data);
                } else {
                    document.getElementById('loading-section').style.display = 'none';
                    document.getElementById('login-section').style.display = 'block';
                    errorMsg.innerText = res.message;
                    errorMsg.classList.remove('d-none');
                }
            })
            .catch(error => {
                document.getElementById('loading-section').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
                errorMsg.innerText = "Terjadi kesalahan saat menghubungi server. Pastikan koneksi internet stabil.";
                errorMsg.classList.remove('d-none');
                console.error("Error Fetch:", error);
            });
    });

    function resetForm() {
        sessionStorage.removeItem("dataTKA");
        setBackground('login');
        
        document.getElementById('tgl-lahir').type = 'password';
        document.getElementById('eyeIcon').className = 'bi bi-eye-slash';
        
        document.getElementById('login-form').reset();
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('nisn').focus();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

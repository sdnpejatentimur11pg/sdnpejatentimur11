<style>
    /* CSS Khusus untuk Module Pengumuman agar lebih "Pop-out" */
    .pengumuman-wrapper {
        background: linear-gradient(135deg, #ffffff 0%, #fff5f5 100%);
        border-top: 5px solid #DC2626 !important;
        box-shadow: 0 1rem 3rem rgba(0,0,0,0.1) !important;
    }

    /* KUNCI UTAMA: Mengunci Lebar (50%) DAN Tinggi (430px) secara mutlak */
    .col-image-fixed {
        flex: 0 0 50% !important;
        width: 50% !important;
        max-width: 50% !important;
        min-width: 0 !important;
        height: 430px !important; /* <--- KUNCI TINGGI CONTAINER DI SINI */
        overflow: hidden;
    }

    /* Paksa semua elemen di dalam carousel untuk tunduk pada tinggi 430px */
    .col-image-fixed .carousel,
    .col-image-fixed .carousel-inner,
    .col-image-fixed .carousel-item,
    .col-image-fixed .carousel-item img {
        height: 100% !important;
        width: 100% !important;
        object-fit: cover !important; /* Foto otomatis terpotong rapi di tengah jika terlalu tinggi/lebar */
    }
    
    .timer-box {
        background: linear-gradient(145deg, #1a1a1a, #2d2d2d);
        border: 1px solid rgba(220, 38, 38, 0.2);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    
    .timer-box::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 4px;
        background: #DC2626;
    }

    .timer-box:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(220, 38, 38, 0.2);
        border-color: rgba(220, 38, 38, 0.5);
    }

    .icon-pulse {
        display: inline-block;
        animation: pulse-animation 2s infinite;
    }

    @keyframes pulse-animation {
        0% { transform: scale(1); text-shadow: 0 0 0 rgba(220, 38, 38, 0.4); }
        50% { transform: scale(1.1); text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); }
        100% { transform: scale(1); text-shadow: 0 0 0 rgba(220, 38, 38, 0.4); }
    }

    .text-gradient {
        background: linear-gradient(90deg, #DC2626, #991B1B);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    /* Responsif: Lepas kunci tinggi saat dibuka di HP agar layout menumpuk natural */
    @media (max-width: 991.98px) {
        .col-image-fixed {
            flex: 0 0 100% !important;
            width: 100% !important;
            max-width: 100% !important;
            height: 280px !important; /* Tinggi saat di HP dibuat lebih pendek agar tidak makan tempat */
        }
    }
</style>
